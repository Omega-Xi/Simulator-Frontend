<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Stock Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .loader-container {
            text-align: center;
            color: white;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-text {
            font-size: 18px;
            opacity: 0.9;
        }

        .error-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            max-width: 400px;
            margin: 20px;
        }

        .error-container h2 {
            color: #f44;
            margin-bottom: 10px;
        }

        .error-container p {
            color: #666;
            margin-bottom: 20px;
        }

        .btn-retry {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-retry:hover {
            background: #5a67d8;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loader-container">
            <div class="spinner"></div>
            <div class="loader-text">Loading Stock Simulator...</div>
        </div>
    </div>

    <script>
        // Configuration
        const STORAGE_KEYS = {
            TOKEN: 'jwt_token',
            USER_EMAIL: 'user_email',
            USER_NAME: 'user_name'
        };

        // Helper functions
        const storage = {
            getToken: () => localStorage.getItem(STORAGE_KEYS.TOKEN),
            setToken: (token) => localStorage.setItem(STORAGE_KEYS.TOKEN, token),
            removeToken: () => localStorage.removeItem(STORAGE_KEYS.TOKEN),
            clearAll: () => {
                localStorage.removeItem(STORAGE_KEYS.TOKEN);
                localStorage.removeItem(STORAGE_KEYS.USER_EMAIL);
                localStorage.removeItem(STORAGE_KEYS.USER_NAME);
            }
        };

        // Validate if token exists and is not expired (basic check)
        function isTokenValid() {
            const token = storage.getToken();
            if (!token) return false;
            
            try {
                // Simple JWT expiration check (if token is JWT format)
                const payload = JSON.parse(atob(token.split('.')[1]));
                const exp = payload.exp;
                if (exp) {
                    const now = Math.floor(Date.now() / 1000);
                    if (now > exp) {
                        // Token expired, clear it
                        storage.clearAll();
                        return false;
                    }
                }
                return true;
            } catch (e) {
                // If token is not JWT format, assume it's valid if exists
                return true;
            }
        }

        // Redirect to appropriate page
        function redirectToAppropriatePage() {
            const tokenValid = isTokenValid();
            
            // Small delay to ensure smooth transition
            setTimeout(() => {
                if (tokenValid) {
                    // User is logged in, send to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    // User is not logged in, send to signin page
                    window.location.href = 'signin.html';
                }
            }, 500);
        }

        // Check if this is first load and show any special messages
        function checkForMessages() {
            const urlParams = new URLSearchParams(window.location.search);
            const message = urlParams.get('message');
            const error = urlParams.get('error');
            
            if (message) {
                console.log('Info:', message);
            }
            if (error) {
                console.error('Error:', error);
            }
        }

        // Handle network errors
        function handleNetworkError() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                <div class="error-container">
                    <h2>⚠️ Connection Error</h2>
                    <p>Unable to connect to the server. Please check your internet connection and try again.</p>
                    <button class="btn-retry" onclick="window.location.reload()">Retry</button>
                </div>
            `;
        }

        // Main initialization
        function init() {
            checkForMessages();
            
            // Add offline detection
            if (!navigator.onLine) {
                handleNetworkError();
                return;
            }
            
            // Listen for online/offline events
            window.addEventListener('online', () => {
                window.location.reload();
            });
            
            window.addEventListener('offline', () => {
                handleNetworkError();
            });
            
            // Proceed with redirect
            redirectToAppropriatePage();
        }

        // Start the app
        init();
    </script>
</body>
</html>
