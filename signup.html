<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module">
        import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    </script>
    <link rel="stylesheet" href="signin.css">
    <title>Sign-Up</title>
</head>
<body>
    <div id="bg"></div>
    <div class="form-container">
        <h2>Sign Up</h2>
        <form>
            <!-- Name -->
             <label for="name">Name</label>
             <input type="text" name="name" id="name" placeholder="Enter your name" required>

            <!-- Email -->
             <label for="email">Email</label>
             <input type="email" name="email" id="email" placeholder="Enter your email" required>

            <!-- Password -->
             <label for="password">Password</label>
             <input type="password" name="password" id="password" placeholder="Enter your password" required>

            <!-- Password -->
             <label for="confirm-password">Confirm Password</label>
             <input type="password" name="confirm-password" id="confirm-password" placeholder="Enter your password" required>
             <div id="toggle">👁️</div>
            
            <!-- Margin Enabled -->
             <div class="form-options">
                <label><input type="checkbox" name="marginenabled" id="marginenabled"> Margin Facility</label>
             </div>

            <!-- Submit button -->
             <button type="submit">Sign Up</button>

            <!-- Extra link -->
             <p class="signin-text">Already have an account? <a href="signin.html">Sign In</a></p>
        </form>
    </div>
    <script type="module" src="threejs-bg.js"></script>  
    <script src="signup.js"></script> 
</body>
</html>
