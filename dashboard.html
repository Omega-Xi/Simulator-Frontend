<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
    <title>Dashboard</title>
</head>
<body>
    <table border="2" width="100%" height="100%">
        <tr height="5%">
        <th colspan="3">
            <div class="headerBar">
                <div class="identityBlock">
                    <span class="userName"></span>
                    <span class="userId"></span>
                </div>
                <div class="financialBlock">
                    <span class="pnl negative"></span>
                    <span class="cashBalance"></span>
                    <span class="marginStatus"></span>
                </div>
                <div class="headerActions">
                    <button class="settings-btn"><i class="fas fa-cog"></i> Settings</button>
                    <button class="logout-btn" onclick="logOut()"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
        </th>
        </tr>
        <tr height="25%">
            <td width="20%" rowspan="2" id="watchlistarea" valign="top">
                <div id="watchlistcontainer">
                <table width="100%" id="watchlisttable">
                    <tr><th colspan="4">Watchlist<div display="inline-block" style="float: right;" id="addtowatchlistbtn">+</div></th></tr>
                </table>
                </div>
            </td>
            <td rowspan="3" id="chartarea">
                <div id="chartLegend" class="chart-legend"></div>
                <div id="chartControls">
                    <div id="timeframeSelector">
                        <button data-tf="1" class="active">1m</button>
                        <button data-tf="5">5m</button>
                        <button data-tf="15">15m</button>
                        <button data-tf="30">30m</button>
                        <button data-tf="60">1h</button>
                    </div>
                    <div id="indicatorSelector">
                        <button id="toggleSMA" class="active">SMA</button>
                        <button id="toggleFilledOrders"><i class="fas fa-exchange-alt"></i></button>
                    </div>
                </div>
                <div id="chartTooltip" class="chart-tooltip"></div>
                <div id="chart"></div>
            </td>
            <td width="20%" rowspan="4" id="orderbookarea">
                <div class="orderBookHeader">
                    <span>Order Book</span>
                    <div class="orderBookControls">
                    <select id="statusFilter" onchange="applyFilterAndSort()">
                        <option value="all">All</option>
                        <option value="pending">Pending</option>
                        <option value="triggerpending">Trigger</option>
                        <option value="filled">Filled</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                    <select id="sortBy" onchange="applyFilterAndSort()">
                        <option value="status">Status</option>
                        <option value="time">Time</option>
                        <option value="symbol">Symbol</option>
                        <option value="price">Price</option>
                    </select>
                    </div>
                </div>
                <!-- Hidden dropdown modal -->
                <div id="modifyDropdown" class="modify-dropdown hidden">
                    <h4 id="modifySymbol">Modify Order — </h4>
                    
                    <div class="formRow">
                        <label>Quantity</label>
                        <input type="number" id="modifyQty">
                    </div>
                    
                    <div class="formRow">
                        <label>Price</label>
                        <input type="number" id="modifyPrice">
                    </div>
                    
                    <div class="formRow">
                        <label>Trigger Price</label>
                        <input type="number" id="modifyTrigger">
                    </div>
                    
                    <div class="formRow">
                        <label>Validity</label>
                        <select id="modifyValidity">
                        <option value="day">Day</option>
                        <option value="IOC">IOC</option>
                        </select>
                    </div>
                    
                    <div class="formActions">
                        <button class="saveBtn" onclick="modifyOrder()">Confirm</button>
                        <button class="cancelBtn" onclick="closeModifyDropdown()"></button>
                    </div>
                </div>
                <div id="orderBookPanel">
                    <div class="orderBookContainer">
                        <!-- Orders injected here -->
                    </div>
                </div>
            </td>
        </tr>
        <tr height="25%"></tr>
        <tr height="25%">
            <td rowspan="2" id="positionsarea">
                <div class="holdingsHeader">
                    <span class="totalPnL">Total PnL: --</span>
                    <button class="exitAllBtn" onclick="exitAll()">Exit All</button>
                </div>
                <div id="holdingsPanel">
                </div>
            </td>
        </tr>
        <tr height="20%">
            <td id="placeorderarea">
                <div id="orderPanel">
                    <button id="buyBtn" class="order-btn buy">BUY</button>

                    <div id="orderForm">
                        <div>
                            <label>Lots<small id="lotinfo"></small><span id="estimatedAmount" class="est-badge"></span></label>
                            <div class="lot-row">
                                <input type="number" id="orderLot" placeholder="Enter lots" min="1">
                            </div>
                        </div>

                        <div>
                            <label>Order Type</label>
                            <select id="orderType">
                            <option value="market">Market</option>
                            <option value="limit">Limit</option>
                            <option value="stoploss">Stop Loss</option>
                            <option value="stoplimit">Stop Limit</option>
                            </select>
                        </div>

                        <div>
                            <label>Limit Price</label>
                            <input type="number" id="limitPrice" placeholder="Enter limit price" disabled>
                        </div>

                        <div>
                            <label>Trigger Price</label>
                            <input type="number" id="triggerPrice" placeholder="Enter trigger price" disabled>
                        </div>
                    </div>


                    <button id="sellBtn" class="order-btn sell">SELL</button>
                </div>
            </td>
        </tr>
    </table>
    <script src="watchlist.js"></script>
</body>
</html>
